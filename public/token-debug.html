<!DOCTYPE html>
<html>
<head>
    <title>Token Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-info { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Token Debug Information</h1>
    
    <div class="debug-info">
        <h3>Current Token Status</h3>
        <div id="tokenInfo"></div>
    </div>
    
    <div class="debug-info">
        <h3>Test Upload API</h3>
        <button onclick="testUpload()">Test Upload with Current Token</button>
        <div id="uploadResult"></div>
    </div>

    <script>
        function displayTokenInfo() {
            const token = localStorage.getItem('token');
            const tokenInfo = document.getElementById('tokenInfo');
            
            if (!token) {
                tokenInfo.innerHTML = '<div class="error">No token found in localStorage</div>';
                return;
            }
            
            try {
                // Decode JWT payload (without verification)
                const payload = JSON.parse(atob(token.split('.')[1]));
                const now = Math.floor(Date.now() / 1000);
                const isExpired = payload.exp < now;
                
                tokenInfo.innerHTML = `
                    <div class="${isExpired ? 'error' : 'success'}">
                        <p><strong>Token Found:</strong> ${token.substring(0, 50)}...</p>
                        <p><strong>User ID:</strong> ${payload.userId}</p>
                        <p><strong>Email:</strong> ${payload.email}</p>
                        <p><strong>Issued At:</strong> ${new Date(payload.iat * 1000).toLocaleString()}</p>
                        <p><strong>Expires At:</strong> ${new Date(payload.exp * 1000).toLocaleString()}</p>
                        <p><strong>Status:</strong> ${isExpired ? 'EXPIRED' : 'VALID'}</p>
                    </div>
                `;
            } catch (error) {
                tokenInfo.innerHTML = `<div class="error">Error decoding token: ${error.message}</div>`;
            }
        }
        
        async function testUpload() {
            const token = localStorage.getItem('token');
            const resultDiv = document.getElementById('uploadResult');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="error">No token available for testing</div>';
                return;
            }
            
            resultDiv.innerHTML = '<p>Testing upload...</p>';
            
            try {
                const response = await fetch('/api/uploads', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        vendorId: 1,
                        fileName: 'debug-test.csv',
                        fileContent: 'data:text/csv;base64,UFJPRFVDVENPREUsUFJPRFVOVE5BTUUsUFJJQ0UKVEVTVDAwMSxUZXN0IFByb2R1Y3QsMTAuOTk='
                    })
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                        <p><strong>Response:</strong></p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }
        
        // Display token info on load
        displayTokenInfo();
    </script>
</body>
</html>
